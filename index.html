<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #fdf2f8; /* Soft pink background */
            overflow: hidden; /* Prevents scrollbars when the No button moves */
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container & Transitions */
        .step-container {
            background: white;
            padding: 2.5rem 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 90%;
            max-width: 450px;
            text-align: center;
            border: 4px solid #fbcfe8;
            display: none;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .step-container.active {
            display: block;
            opacity: 1;
            transform: scale(1);
        }

        /* Pure CSS Blooming Flower */
        .flower {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem auto;
        }
        .petal {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #f472b6;
            border-radius: 50% 50% 0 50%;
            top: 40px;
            left: 40px;
            transform-origin: bottom right;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(244, 114, 182, 0.4);
        }
        .flower-center {
            position: absolute;
            width: 45px;
            height: 45px;
            background: #fbbf24;
            border-radius: 50%;
            top: 38px;
            left: 38px;
            z-index: 10;
        }
        /* Bloom states */
        .flower.bloom .p1 { transform: rotate(0deg) translateX(35px) scale(1.2); }
        .flower.bloom .p2 { transform: rotate(45deg) translateX(35px) scale(1.2); }
        .flower.bloom .p3 { transform: rotate(90deg) translateX(35px) scale(1.2); }
        .flower.bloom .p4 { transform: rotate(135deg) translateX(35px) scale(1.2); }
        .flower.bloom .p5 { transform: rotate(180deg) translateX(35px) scale(1.2); }
        .flower.bloom .p6 { transform: rotate(225deg) translateX(35px) scale(1.2); }
        .flower.bloom .p7 { transform: rotate(270deg) translateX(35px) scale(1.2); }
        .flower.bloom .p8 { transform: rotate(315deg) translateX(35px) scale(1.2); }

        /* Buttons */
        .btn {
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            font-weight: bold;
            font-size: 1.125rem;
            transition: transform 0.1s, box-shadow 0.2s;
            cursor: pointer;
            border: none;
        }
        .btn:active { transform: scale(0.95); }
        .btn-yes {
            background-color: #ec4899;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(236, 72, 153, 0.4);
        }
        .btn-no {
            background-color: #9ca3af;
            color: white;
            position: relative; /* Will become fixed via JS */
            z-index: 50;
        }

        /* Heart Animation for Final Page */
        .heart {
            color: #e11d48;
            font-size: 4rem;
            animation: beat 1s infinite alternate;
        }
        @keyframes beat {
            to { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div id="step1" class="step-container active">
        <div class="flower" id="flower">
            <div class="petal p1"></div><div class="petal p2"></div>
            <div class="petal p3"></div><div class="petal p4"></div>
            <div class="petal p5"></div><div class="petal p6"></div>
            <div class="petal p7"></div><div class="petal p8"></div>
            <div class="flower-center"></div>
        </div>
        <h1 class="text-2xl font-bold text-pink-600 mb-6">Do you love me? 🌸</h1>
        <div class="flex justify-center gap-4 relative h-12">
            <button onclick="nextStep(2)" class="btn btn-yes">Yes</button>
            <button onmouseover="dodgeCursor(this)" ontouchstart="dodgeCursor(this)" class="btn btn-no">No</button>
        </div>
    </div>

    <div id="step2" class="step-container">
        <h1 class="text-2xl font-bold text-pink-600 mb-6">Are you sure you love me? 🥺</h1>
        <div class="flex justify-center gap-4 relative h-12">
            <button onclick="nextStep(3)" class="btn btn-yes">Yes, forever!</button>
            <button onmouseover="dodgeCursor(this)" ontouchstart="dodgeCursor(this)" class="btn btn-no">No</button>
        </div>
    </div>

    <div id="step3" class="step-container">
        <h1 class="text-2xl font-bold text-pink-600 mb-2">Can you give me kiss, hug... 🥰</h1>
        <p class="text-gray-500 mb-4 font-semibold">can you give me that?</p>
        
        <textarea id="extraInput" rows="3" placeholder="If you want you can give me more also..." 
            class="w-full border-2 border-pink-200 rounded-xl p-3 focus:ring-2 focus:ring-pink-400 focus:border-pink-400 outline-none transition-all resize-none mb-2"></textarea>
        
        <p id="sadWarning" class="text-red-500 font-semibold text-sm hidden mb-4">
            🥺 You do not wanna give me anything extra at all?
        </p>

        <button onclick="validateAndProceed()" class="btn btn-yes w-full mt-2">Next ❤️</button>
    </div>

    <div id="step4" class="step-container">
        <div class="heart mb-4">❤️</div>
        <h1 class="text-3xl font-bold text-pink-600 mb-2">I love you so much meri jaan,</h1>
        <h2 class="text-2xl font-bold text-pink-500 italic">Sunkiss 💋</h2>
    </div>

    <script>
        // Trigger Flower Bloom on load
        setTimeout(() => {
            document.getElementById('flower').classList.add('bloom');
        }, 300);

        // Function to move to the next step
        function nextStep(stepNumber) {
            // Hide all steps
            document.querySelectorAll('.step-container').forEach(el => {
                el.classList.remove('active');
            });
            // Show target step
            document.getElementById('step' + stepNumber).classList.add('active');
            
            // If it's the final step, fire confetti!
            if(stepNumber === 4) {
                fireConfetti();
            }
        }

        // Logic for the "No" button dodging
        function dodgeCursor(btn) {
            // Make button fixed so it can move anywhere on screen
            btn.style.position = 'fixed';
            
            // Calculate safe boundaries so the button doesn't go off-screen
            const btnWidth = btn.offsetWidth;
            const btnHeight = btn.offsetHeight;
            const maxX = window.innerWidth - btnWidth - 20;
            const maxY = window.innerHeight - btnHeight - 20;
            
            // Generate random coordinates
            const randomX = Math.max(20, Math.floor(Math.random() * maxX));
            const randomY = Math.max(20, Math.floor(Math.random() * maxY));
            
            // Apply new position
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        // Logic for validating Step 3
        function validateAndProceed() {
            const inputVal = document.getElementById('extraInput').value.trim();
            const warning = document.getElementById('sadWarning');
            
            if (inputVal === '') {
                // Show sad warning if empty
                warning.classList.remove('hidden');
                // Shake the box a little
                const container = document.getElementById('step3');
                container.style.transform = 'translateX(-10px)';
                setTimeout(() => container.style.transform = 'translateX(10px)', 100);
                setTimeout(() => container.style.transform = 'translateX(0)', 200);
            } else {
                // Proceed to final page if user wrote something
                warning.classList.add('hidden');
                nextStep(4);
            }
        }

        // Confetti celebration function
        function fireConfetti() {
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ec4899', '#f472b6', '#fbcfe8']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ec4899', '#f472b6', '#fbcfe8']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
